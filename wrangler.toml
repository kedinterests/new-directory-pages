# Cloudflare Pages + Functions configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "directory-mineralrightsforum"
pages_build_output_dir = "./public"
compatibility_date = "2024-01-01"

# KV namespace - will be created; replace id with actual namespace ID after creation
[[kv_namespaces]]
binding = "DIRECTORIES_KV"
id = "5519fd1196304fe9b7be58057f4455a0"

# MASTER_SHEET_URL and REFRESH_KEY: set in Cloudflare dashboard (Settings → Environment variables)
# Do not add them here - duplicate bindings cause "Binding name already in use" on deploy
